# SD1.5 inpainting smoke-test config — ft (DreamBooth / full fine-tune) mode.
#
# Used by: run_sd15_inpainting_test.sh --mode ft  →  train_db.py
#
# Per-run path fields (pretrained_model_name_or_path, train_data_dir,
# output_dir, output_name) are passed via the command line by the test script
# and override anything in this file. max_train_steps is also overridable via
# the script's --steps option.

# --- precision / memory ---
mixed_precision = "fp16"
gradient_checkpointing = true
sdpa = true
max_data_loader_n_workers = 0
# cache_latents is incompatible with train_inpainting: masks are generated
# randomly per step from the original image, so the image must be re-read on
# every step. The combination is rejected by argument validation in train_util.
cache_latents = false
cache_latents_to_disk = false

# --- bucketing ---
enable_bucket = true
resolution = "512,512"
min_bucket_reso = 256
max_bucket_reso = 1024
bucket_reso_steps = 64
bucket_no_upscale = true

# --- training ---
train_batch_size = 1
max_train_steps = 20
gradient_accumulation_steps = 1
train_inpainting = true

# --- optimiser (Adafactor — low VRAM) ---
optimizer_type = "Adafactor"
optimizer_args = ["relative_step=False", "scale_parameter=False", "warmup_init=False"]
learning_rate = 1e-4
learning_rate_te = 0
lr_scheduler = "constant"

# --- captions ---
caption_extension = ".caption"
shuffle_caption = false
max_token_length = 75
clip_skip = 1

# --- noise ---
loss_type = "l2"
multires_noise_discount = 0.3
noise_offset_type = "Original"

# --- saving ---
save_model_as = "safetensors"
save_precision = "fp16"
save_every_n_steps = 20
save_state = false

# --- sampling (disabled for smoke test; prompts.txt is not generated) ---
sample_every_n_steps = 0
#sample_sampler = "euler_a"
#sample_prompts = "prompts.txt"
